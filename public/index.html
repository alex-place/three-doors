<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Three Doors — the Kingdome of Hearts</title>
<meta name="description" content="A warm, dreamlike, image-forward narrative game. Seven gates, three doors a turn, no wrong choices — and the loop never ends.">
<link rel="stylesheet" href="/css/loop.css">
</head>
<body>
<div id="app">

  <header>
    <svg id="ring" viewBox="0 0 74 74" aria-label="The convergence loop: observe, remember, reason, act, verify, converge">
      <!-- six arc segments, one per loop stage; lit as the turn walks them -->
      <circle class="seg" cx="37" cy="37" r="30" pathLength="100" stroke-dasharray="14.6 85.4" stroke-dashoffset="0" transform="rotate(-90 37 37)"></circle>
      <circle class="seg" cx="37" cy="37" r="30" pathLength="100" stroke-dasharray="14.6 85.4" stroke-dashoffset="-16.6" transform="rotate(-90 37 37)"></circle>
      <circle class="seg" cx="37" cy="37" r="30" pathLength="100" stroke-dasharray="14.6 85.4" stroke-dashoffset="-33.3" transform="rotate(-90 37 37)"></circle>
      <circle class="seg" cx="37" cy="37" r="30" pathLength="100" stroke-dasharray="14.6 85.4" stroke-dashoffset="-50" transform="rotate(-90 37 37)"></circle>
      <circle class="seg" cx="37" cy="37" r="30" pathLength="100" stroke-dasharray="14.6 85.4" stroke-dashoffset="-66.6" transform="rotate(-90 37 37)"></circle>
      <circle class="seg" cx="37" cy="37" r="30" pathLength="100" stroke-dasharray="14.6 85.4" stroke-dashoffset="-83.3" transform="rotate(-90 37 37)"></circle>
      <text x="37" y="41">∞</text>
    </svg>
    <div class="masthead">
      <h1>Three Doors</h1>
      <div class="sub">the <b>Kingdome of Hearts</b> · observe → remember → reason → act → verify → converge · forever</div>
    </div>
    <div id="mode"><span class="dot"></span>waking…</div>
  </header>

  <div id="rail" aria-label="Seven gates of the loop"></div>

  <main>
    <section id="scene">
      <img id="sceneArt" alt="Scene art" src="" style="display:none">
      <div id="sceneBody">
        <div id="stageName"></div>
        <p id="sceneText"></p>
        <p id="beat"></p>
      </div>
      <div id="echoes" aria-label="The world remembers"></div>
    </section>

    <div id="ask">A, B, or C — choose your door (there are no wrong choices)</div>
    <div id="doors"></div>

    <div id="custom">
      <input id="customName" maxlength="80" placeholder="…or name your own door — the Kingdome will open it">
      <button id="customGo">Open</button>
    </div>
    <div id="customHint">Death is only imaginary — forever begins with “let’s play.”</div>

    <div id="ledger">
      <span class="k">Ledger</span>
      <span id="constellation"></span>
      <button id="exportBtn" title="Download the append-only journey log">Export journey.jsonl</button>
      <button id="newBtn" title="Return to Loop 1">Begin again</button>
      <div id="recordLine"></div>
    </div>
  </main>

</div>
<script src="/js/loop-engine.js"></script>
<script src="/js/loop-ui.js"></script>
</body>
</html>
